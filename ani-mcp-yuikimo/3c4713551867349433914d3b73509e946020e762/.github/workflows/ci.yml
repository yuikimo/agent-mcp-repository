name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=moderate
      - run: npm run type-check
      - run: npm run build
      - run: npm test
